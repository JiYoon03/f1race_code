particle_filter:
  ros__parameters:
    # Particle count bounds (KLD-adaptive)
    num_particles: 500
    min_particles: 250
    max_particles: 5000

    # KLD sampling parameters
    kld_epsilon: 0.05
    kld_delta: 0.01

    # Scan subsampling: use every Nth beam
    angle_step: 18

    # Sensor model
    squash_factor: 2.2     # higher = flatter likelihood (more robust to outliers)
    max_range: 10.0        # metres – discard beams beyond this

    # Motion noise (standard deviation in metres / radians)
    motion_noise_x: 0.05
    motion_noise_y: 0.05
    motion_noise_theta: 0.05

    # Minimum robot displacement before running the correction step
    update_min_d: 0.1      # metres
    update_min_a: 0.1      # radians (~5.7°)

    # Initial pose estimate (set to your map's known start position)
    initial_pose_x: 0.0
    initial_pose_y: 0.0
    initial_pose_a: 0.0

    # Initial covariance (spread of initial particles)
    initial_cov_xx: 0.5
    initial_cov_yy: 0.5
    initial_cov_aa: 0.2
